[build]
  publish = "public"
  command = "yarn build"
[build.environment]
  YARN_VERSION = "1.13.0"
  YARN_FLAGS = "--no-ignore-optional"
# Local `netlify dev`: run Gatsby over plain HTTP (no --S) so Netlify Dev can
# proxy to it. Netlify serves the proxy on `port` and forwards to `targetPort`.
[dev]
  command = "yarn develop:http"
  framework = "#custom"
  targetPort = 8000
  port = 8888
  publish = "public"
# Deploy Preview context: all deploys resulting from a pull/merge request will
# inherit these settings.
[[redirects]]
  from = "/baidu"
  to = "/collateral/ApplicationOfKataContainersInBaiduAICloud.pdf"
[[redirects]]
  from = "/baiducn"
  to = "/collateral/Kata Containers在百度智能云的应用实践.pdf"
[[redirects]]
  from = "https://get.katacontainers.io"
  to = "https://raw.githubusercontent.com/kata-containers/kata-containers/main/utils/kata-manager.sh"
  status = 301
  force = true
[[headers]]
  for = "/*"
  [headers.values]
  Referrer-Policy = "strict-origin-when-cross-origin"